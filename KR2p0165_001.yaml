body:
  text: 楚竹書八昔者君老君子曰昔者君老太子朝君君之母弟是相太子昃聽庶叩叩進太子前之母弟母弟遜退前之太子再三然後並聽之太子母弟至命於閤門以告寺人寺人入告于君君曰召之太子入見如祭祀之事爾司各恭爾事發命不斁君卒太子乃亡聞亡聽不聞不令唯哀悲是思唯邦之大務是敬能事其親君子曰子省蓋喜於內不見於外喜於外不見於內慍於外不見於內慍於內不見於外內言不以出外言不以入舉媺廢惡
